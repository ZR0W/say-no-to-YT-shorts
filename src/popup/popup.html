<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Say No to YouTube Shorts</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="panel">
      <h1 class="title">Shorts visibility</h1>
      <p class="hint">Turn off an option to show that Shorts UI again.</p>

      <label class="row">
        <input type="checkbox" id="hideSidebarShorts" />
        <span>Hide sidebar Shorts link</span>
      </label>
      <label class="row">
        <input type="checkbox" id="hideReelShelf" />
        <span>Hide Shorts reel / shelf rows</span>
      </label>
      <label class="row">
        <input type="checkbox" id="hideRichShortsSections" />
        <span>Hide sections titled “Shorts”</span>
      </label>
      <label class="row">
        <input type="checkbox" id="hideNavigationShorts" />
        <span>Hide Shorts tabs &amp; filter chips</span>
      </label>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
